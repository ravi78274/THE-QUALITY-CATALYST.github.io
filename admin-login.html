<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — The Quality Catalyst</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="admin-login-page">
  <div class="admin-login-card">
    <div style="display:flex;align-items:center;gap:14px;justify-content:center;margin-bottom:28px;">
      <img src="Screenshot 2026-04-14 141346.png" alt="TQC" style="width:52px;height:52px;object-fit:contain;border-radius:8px;border:2px solid var(--border);"/>
      <div>
        <div style="font-family:'Raleway',sans-serif;font-weight:800;font-size:15px;color:var(--navy);">THE QUALITY CATALYST</div>
        <div style="font-size:11px;color:var(--muted);letter-spacing:0.5px;">Admin Portal</div>
      </div>
    </div>

    <h2 style="text-align:center;margin-bottom:4px;font-size:22px;">Admin Login</h2>
    <p style="text-align:center;color:var(--muted);font-size:14px;margin-bottom:28px;">Enter your credentials to access the dashboard</p>

    <div id="loginAlert"></div>

    <form id="loginForm" onsubmit="adminLogin(event)">
      <div class="form-group" style="margin-bottom:16px;">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" required autocomplete="username"/>
      </div>
      <div class="form-group" style="margin-bottom:24px;">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="submit-btn" style="width:100%;text-align:center;">Sign In to Dashboard</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:13px;">
      <a href="index.html" style="color:var(--muted);">← Back to main site</a>
    </p>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
